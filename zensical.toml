[project]
site_name = "The CLI Spec"
site_description = "7 principles for building CLI tools that work for humans, scripts, and AI agents"
site_author = "Ruben Jongejan"
site_url = "https://clispec.dev/"
copyright = """
Copyright &copy; 2026 Ruben Jongejan — <a href="https://creativecommons.org/licenses/by/4.0/">CC BY 4.0</a>
"""

repo_url = "https://github.com/rvben/clispec"
repo_name = "rvben/clispec"

nav = [
  { "The Spec" = "index.md" },
  { "Implementation Guide" = [
    { "Overview" = "guide/index.md" },
    { "Rust (clap)" = "guide/rust.md" },
    { "Go (cobra)" = "guide/go.md" },
    { "Python (click)" = "guide/python.md" },
    { "Verifying Compliance" = "guide/verifying.md" },
    { "CI/CD" = "guide/cicd.md" },
  ]},
]

[project.theme]
language = "en"

features = [
    "content.code.copy",
    "content.code.select",
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.top",
    "navigation.tracking",
    "search.highlight",
]

[[project.theme.palette]]
scheme = "default"
primary = "indigo"
accent = "indigo"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
primary = "indigo"
accent = "indigo"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[project.theme.icon]
logo = "lucide/terminal"
repo = "fontawesome/brands/github"

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/rvben/clispec"
